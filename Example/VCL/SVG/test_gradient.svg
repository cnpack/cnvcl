<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1100" viewBox="0 0 900 1100">

  <defs>
    <!-- зәҝжҖ§жёҗеҸ? objectBoundingBox (й»ҳи®Ө) -->
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF0000"/>
      <stop offset="50%" stop-color="#FFFF00"/>
      <stop offset="100%" stop-color="#0000FF"/>
    </linearGradient>

    <!-- зәҝжҖ§жёҗеҸ? userSpaceOnUse -->
    <linearGradient id="lg2" gradientUnits="userSpaceOnUse" x1="30" y1="50" x2="280" y2="150">
      <stop offset="0%" stop-color="#FF00FF"/>
      <stop offset="100%" stop-color="#00FF00"/>
    </linearGradient>

    <!-- еҫ„еҗ‘жёҗеҸҳ: objectBoundingBox (й»ҳи®Ө) -->
    <radialGradient id="rg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </radialGradient>

    <!-- еҫ„еҗ‘жёҗеҸҳ: userSpaceOnUse -->
    <radialGradient id="rg2" gradientUnits="userSpaceOnUse" cx="600" cy="100" r="70">
      <stop offset="0%" stop-color="#FFFF00"/>
      <stop offset="100%" stop-color="#FF0000"/>
    </radialGradient>

    <!-- жёҗеҸҳжҸҸиҫ№: userSpaceOnUse -->
    <linearGradient id="lg3" gradientUnits="userSpaceOnUse" x1="620" y1="40" x2="820" y2="160">
      <stop offset="0%" stop-color="#FF00FF"/>
      <stop offset="100%" stop-color="#00FF00"/>
    </linearGradient>

    <!-- Clip Path -->
    <clipPath id="clip1">
      <rect x="30" y="380" width="200" height="80" rx="10"/>
    </clipPath>

    <clipPath id="clip2">
      <circle cx="600" cy="420" r="60"/>
    </clipPath>

    <clipPath id="clip3">
      <ellipse cx="450" cy="950" rx="120" ry="40"/>
    </clipPath>

    <clipPath id="clipGroup">
      <rect x="50" y="500" width="300" height="120"/>
    </clipPath>
  </defs>

  <!-- ж Үйўҳ -->
  <text x="450" y="30" font-size="20" text-anchor="middle" fill="#333">CnSVG GDI+ жёІжҹ“ж”№еҠЁжөӢиҜ•</text>

  <!-- ===== жөӢиҜ•1: objectBoundingBox зәҝжҖ§жёҗеҸҳеЎ«е……зҹ©еҪ?===== -->
  <rect x="30" y="50" width="250" height="100" rx="10" fill="url(#lg1)"/>
  <text x="155" y="170" font-size="12" text-anchor="middle" fill="#666">objBBox зәҝжҖ§жёҗеҸҳзҹ©еҪ?/text>

  <!-- ===== жөӢиҜ•2: userSpaceOnUse зәҝжҖ§жёҗеҸҳеЎ«е……зҹ©еҪ?===== -->
  <rect x="30" y="185" width="250" height="80" fill="url(#lg2)"/>
  <text x="155" y="285" font-size="12" text-anchor="middle" fill="#666">userSpace зәҝжҖ§жёҗеҸҳзҹ©еҪ?/text>

  <!-- ===== жөӢиҜ•3: objectBoundingBox еҫ„еҗ‘жёҗеҸҳеЎ«е……ең?===== -->
  <circle cx="450" cy="100" r="70" fill="url(#rg1)"/>
  <text x="450" y="190" font-size="12" text-anchor="middle" fill="#666">objBBox еҫ„еҗ‘жёҗеҸҳең?/text>

  <!-- ===== жөӢиҜ•4: userSpaceOnUse еҫ„еҗ‘жёҗеҸҳеЎ«е……ең?===== -->
  <circle cx="600" cy="100" r="70" fill="url(#rg2)"/>
  <text x="600" y="190" font-size="12" text-anchor="middle" fill="#666">userSpace еҫ„еҗ‘жёҗеҸҳең?/text>

  <!-- ===== жөӢиҜ•5: жёҗеҸҳжҸҸиҫ№жӨӯеңҶ ===== -->
  <ellipse cx="780" cy="100" rx="100" ry="60" fill="none" stroke="url(#lg3)" stroke-width="6"/>
  <text x="780" y="180" font-size="12" text-anchor="middle" fill="#666">жёҗеҸҳжҸҸиҫ№жӨӯеңҶ</text>

  <!-- ===== жөӢиҜ•6: еёҰеҸҳжҚўзҡ„зҹ©еҪў ===== -->
  <rect x="30" y="300" width="120" height="60" fill="#FF8800" transform="translate(50,10) rotate(15)"/>
  <text x="120" y="390" font-size="12" text-anchor="middle" fill="#666">еҸҳжҚўзҹ©еҪў</text>

  <!-- ===== жөӢиҜ•7: еӨҡж®ө PathпјҲзӣҙзә?еј§зәҝпј?===== -->
  <path d="M 350 300 L 450 300 A 50 50 0 0 1 500 350 L 500 380" fill="none" stroke="#9900CC" stroke-width="3"/>
  <text x="425" y="400" font-size="12" text-anchor="middle" fill="#666">Path: зӣҙзәҝ+еј§зәҝ</text>

  <!-- ===== жөӢиҜ•8: дәҢж¬ЎиҙқеЎһе°”жӣІзә?===== -->
  <path d="M 600 300 Q 700 240 800 300 T 900 300" fill="none" stroke="#CC3300" stroke-width="3"/>
  <text x="750" y="320" font-size="12" text-anchor="middle" fill="#666">дәҢж¬ЎиҙқеЎһе°?(Q/T)</text>

  <!-- ===== жөӢиҜ•9: Clip Path - зҹ©еҪўиЈҒеҲҮ ===== -->
  <g clip-path="url(#clip1)">
    <rect x="10" y="370" width="300" height="120" fill="url(#lg2)"/>
    <circle cx="180" cy="420" r="50" fill="url(#rg1)"/>
  </g>
  <text x="130" y="475" font-size="12" text-anchor="middle" fill="#666">зҹ©еҪў ClipPath</text>

  <!-- ===== жөӢиҜ•10: Clip Path - еңҶеҪўиЈҒеҲҮ ===== -->
  <g clip-path="url(#clip2)">
    <rect x="520" y="360" width="160" height="120" fill="url(#lg2)"/>
    <rect x="540" y="380" width="120" height="80" fill="url(#rg1)" opacity="0.7"/>
  </g>
  <text x="600" y="495" font-size="12" text-anchor="middle" fill="#666">еңҶеҪў ClipPath</text>

  <!-- ===== жөӢиҜ•11: Group её?Clip Path ===== -->
  <g clip-path="url(#clipGroup)">
    <rect x="30" y="490" width="200" height="60" fill="#00CC66"/>
    <rect x="100" y="510" width="200" height="60" fill="#CC6600"/>
    <circle cx="250" cy="540" r="50" fill="url(#rg1)"/>
  </g>
  <text x="200" y="635" font-size="12" text-anchor="middle" fill="#666">Group её?ClipPath</text>

  <!-- ===== жөӢиҜ•12: жёҗеҸҳеЎ«е……ж–Үеӯ— ===== -->
  <text x="500" y="550" font-size="36" font-weight="bold" fill="url(#lg2)">жёҗеҸҳж–Үеӯ—</text>
  <text x="500" y="575" font-size="12" text-anchor="middle" fill="#666">жёҗеҸҳеЎ«е……ж–Үеӯ—</text>

  <!-- ===== жөӢиҜ•13: жёҗеҸҳеЎ«е……еӨҡиҫ№еҪ?===== -->
  <polygon points="100,700 150,660 200,700 180,750 120,750" fill="url(#lg1)" stroke="url(#lg3)" stroke-width="2"/>
  <text x="150" y="775" font-size="12" text-anchor="middle" fill="#666">жёҗеҸҳеЎ«е……+жҸҸиҫ№еӨҡиҫ№еҪ?/text>

  <!-- ===== жөӢиҜ•14: еёҰеҸҳжҚўзҡ„дёүж¬ЎиҙқеЎһе°?Path ===== -->
  <g transform="translate(400,700) rotate(-10)">
    <path d="M 0 0 C 30 -40 70 -40 100 0 C 130 40 170 40 200 0" fill="none" stroke="url(#lg2)" stroke-width="4"/>
    <text x="100" y="30" font-size="12" text-anchor="middle" fill="#666">еҸҳжҚўдёӢзҡ„дёүж¬ЎиҙқеЎһе°?/text>
  </g>

  <!-- ===== жөӢиҜ•15: еј§зәҝй—ӯеҗҲи·Ҝеҫ„ + жёҗеҸҳ ===== -->
  <path d="M 650 680 L 750 680 A 50 50 0 0 1 800 730 L 800 780 L 650 780 Z"
        fill="url(#rg1)" stroke="#333" stroke-width="2"/>
  <text x="725" y="800" font-size="12" text-anchor="middle" fill="#666">еј§зәҝй—ӯеҗҲи·Ҝеҫ„+жёҗеҸҳ</text>

  <!-- ===== жөӢиҜ•16: жӨӯеңҶеј§пјҲеӨ§еј§+е°Ҹеј§еҜ№жҜ”пј?===== -->
  <path d="M 50 850 A 80 40 0 0 0 250 850" fill="none" stroke="#FF4400" stroke-width="3"/>
  <path d="M 50 870 A 80 40 0 0 1 250 870" fill="none" stroke="#0044FF" stroke-width="3"/>
  <text x="150" y="920" font-size="12" text-anchor="middle" fill="#666">жӨӯеңҶеј? е°Ҹеј§(зә? vs еӨ§еј§(и“?</text>

  <!-- ===== жөӢиҜ•17: еёҰеҸҳжҚўзҡ„жёҗеҸҳең?===== -->
  <circle cx="450" cy="880" r="40" fill="url(#rg1)" transform="scale(1.5) translate(-100,-100)"/>
  <text x="450" y="960" font-size="12" text-anchor="middle" fill="#666">зј©ж”ҫ+е№із§»жёҗеҸҳең?/text>

  <!-- ===== жөӢиҜ•18: жӨӯеңҶ ClipPath + жёҗеҸҳеҸ еҠ  ===== -->
  <g clip-path="url(#clip3)">
    <rect x="280" y="920" width="340" height="80" fill="url(#lg2)"/>
    <rect x="300" y="930" width="300" height="60" fill="url(#rg1)" opacity="0.6"/>
  </g>
  <text x="450" y="1020" font-size="12" text-anchor="middle" fill="#666">жӨӯеңҶ ClipPath + жёҗеҸҳеҸ еҠ </text>

  <!-- ===== жөӢиҜ•19: жҠҳзәҝ + жёҗеҸҳжҸҸиҫ№ ===== -->
  <polyline points="650,850 700,830 750,860 800,820 850,870" fill="none" stroke="url(#lg3)" stroke-width="4"/>
  <text x="750" y="900" font-size="12" text-anchor="middle" fill="#666">жёҗеҸҳжҸҸиҫ№жҠҳзәҝ</text>

  <!-- ===== жөӢиҜ•20: еӨҡйҮҚеҸҳжҚўз»„еҗҲ ===== -->
  <g transform="translate(100,1000)">
    <g transform="rotate(5)">
      <rect x="0" y="0" width="100" height="50" fill="url(#lg1)" rx="5"/>
    </g>
  </g>
  <g transform="translate(300,1000) scale(0.7)">
    <circle cx="50" cy="30" r="30" fill="url(#rg1)"/>
  </g>
  <g transform="translate(500,1000) skewX(10)">
    <ellipse cx="60" cy="30" rx="60" ry="25" fill="url(#lg1)" stroke="url(#lg3)" stroke-width="2"/>
  </g>
  <text x="350" y="1070" font-size="12" text-anchor="middle" fill="#666">еӨҡйҮҚеҸҳжҚў: translate+rotate / scale / skewX</text>

  <!-- еә•зәҝ -->
  <line x1="20" y1="1090" x2="880" y2="1090" stroke="#CCCCCC" stroke-width="1"/>
</svg>
